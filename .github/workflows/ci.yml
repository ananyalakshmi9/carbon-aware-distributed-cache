name: CI/CD Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:

  # ---------------------------------
  # 1️⃣ INSTALL STAGE
  # ---------------------------------
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend Dependencies
        run: |
          cd src/backend
          npm ci

      - name: Install Frontend Dependencies
        run: |
          cd src/frontend
          npm ci

  # ---------------------------------
  # 2️⃣ LINT STAGE
  # ---------------------------------
  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run ESLint (backend only)
        run: |
          cd src/backend
          npm ci
          npx eslint . --ext .js || true

  # ---------------------------------
  # 3️⃣ BUILD STAGE
  # ---------------------------------
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Frontend
        run: |
          cd src/frontend
          npm ci
          npm run build

  # ---------------------------------
  # 4️⃣ TEST STAGE
  # ---------------------------------
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install + Run Backend Tests with Coverage
        run: |
          cd src/backend
          npm ci
          npm test -- --runInBand --coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage
          path: src/backend/coverage

  # ---------------------------------
  # 5️⃣ PACKAGE STAGE
  # ---------------------------------
  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Create Deployment Package
        run: |
          mkdir deployment
          cp -r src/backend deployment/backend
          cp -r src/frontend deployment/frontend
          zip -r deployment.zip deployment

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v3
        with:
          name: deployment-package
          path: deployment.zip